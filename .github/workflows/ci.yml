name: CI

on: [push, pull_request]

jobs:
  build:
    name: ${{ matrix.toolchain.name }}
    runs-on: ${{ matrix.toolchain.os }}

    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        toolchain:
        - name: Linux Clang
          os: ubuntu-latest
          cmake_args: -DCMAKE_C_COMPILER=clang

        - name: Linux GCC
          os: ubuntu-latest

        - name: macOS ARM
          os: macos-26

        - name: macOS Intel
          os: macos-26-intel

        - name: MinGW
          os: windows-latest
          cmake_args: -G "MinGW Makefiles"

        - name: MSVC 32-bit
          os: windows-latest
          cmake_args: -A Win32

        - name: MSVC 64-bit
          os: windows-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update && sudo apt-get install libusb-1.0-0-dev

    - name: Install Windows Dependencies
      if: runner.os == 'Windows'
      run: |
        LIBUSB_VERSION=1.0.30
        LIBUSB_PACKAGE=libusb-$LIBUSB_VERSION.7z
        aria2c -q https://github.com/libusb/libusb/releases/download/v$LIBUSB_VERSION/$LIBUSB_PACKAGE
        7z x $LIBUSB_PACKAGE -olibusb

    - name: Install MinGW
      if: startsWith(matrix.toolchain.name, 'MinGW')
      uses: msys2/setup-msys2@v2

    - name: Configure
      run: |
        cmake -B build ${{ matrix.toolchain.cmake_args }} .

    - name: Build
      run: |
        export MAKEFLAGS=--keep-going
        cmake --build build --config Release

    - name: Install Linux/macOS
      if: runner.os != 'Windows'
      run: |
        sudo cmake --install build

    - name: Test POSIX
      if: ${{ !startsWith(matrix.toolchain.name, 'MSVC') }}
      run: |
        build/fobos_devinfo

    - name: Test MSVC
      if: startsWith(matrix.toolchain.name, 'MSVC')
      run: |
        build/Release/fobos_devinfo.exe

    - name: List Build Directory
      if: always()
      run: |
        git status
        ls -lR build
